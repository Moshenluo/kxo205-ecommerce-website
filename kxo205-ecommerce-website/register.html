<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registration Form</title>
    <link rel="stylesheet" type="text/css" href="register.css">	
</head>
<body>
	<h1>Starting a Journey of Discovery</h1>

	<form name="registration" onsubmit="return validateForm()">
		<label for="username">Username:</label>
		<input type="text" placeholder="Enter Username" id="username" name="username" autocomplete="off"><br><br>
 
		<label for="email">Email:</label>
		<input type="text" placeholder="Enter Email" id="email" name="email" autocomplete="off"><br><br>

		<label for="password">Password:</label>
		<input type="password" placeholder="Enter Password" id="password" name="password"><br><br>

		<label for="confirmPassword">Confirm Password:</label>
		<input type="password" placeholder="Confirm Password" id="confirmPassword" name="confirmPassword"><br><br>

		<input type="submit" value="Register">
        <input type="reset" value="Reset">
    </form>
</body>
<script src="resgister.js"></script>
</html>
